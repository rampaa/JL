name: Publish

on:
  release:
    types: [published]

jobs:
  sqlite:
    name: Download SQLite
    runs-on: windows-latest
    steps:
      - name: Download latest SQLite amalgamation
        shell: bash
        run: |
          set -euo pipefail
          mkdir sqlite
          REL_PATH=$(curl --fail -s https://www.sqlite.org/download.html | grep -oE '[0-9]{4}/sqlite-amalgamation-[0-9]+\.zip' | head -n1 || true)
          if [ -z "$REL_PATH" ]; then
            echo "Failed to locate SQLite amalgamation URL"
            exit 1
          fi
          curl --fail -L "https://www.sqlite.org/$REL_PATH" -o sqlite.zip
          unzip -q sqlite.zip
          sqlite_dir=$(find . -maxdepth 1 -type d -name "sqlite-amalgamation-*")
          mv "$sqlite_dir"/* sqlite/

      - name: Upload SQLite artifact
        uses: actions/upload-artifact@v7
        with:
          name: sqlite-amalgamation
          path: sqlite/

  release:
    name: Release
    needs: sqlite
    strategy:
      matrix:
        kind: ['windowsx64', 'windowsx86', 'windowsarm64']
        include:
          - kind: windowsx64
            os: windows-latest
            target: win-x64
            msvc_arch: x64
            platform: x64
            
          - kind: windowsx86
            os: windows-latest
            target: win-x86
            msvc_arch: x86
            platform: x86
            
          - kind: windowsarm64
            os: windows-latest
            target: win-arm64
            msvc_arch: amd64_arm64
            platform: ARM64
            
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Download SQLite artifact
        uses: actions/download-artifact@v8
        with:
          name: sqlite-amalgamation
          path: sqlite-src

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE64_PFX: ${{ secrets.BASE64_PFX }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
          MSYS_NO_PATHCONV: 1
        shell: bash
        run: |
          set -euo pipefail
          tag=$(git describe --tags --abbrev=0)
          release_name="JL-$tag-${{ matrix.target }}"

          if [ "${{ matrix.target }}" = "win-x86" ]; then
            SQLITE_DEFAULT_MMAP_SIZE=0
            SQLITE_MAX_MMAP_SIZE=2147418112
          else
            SQLITE_DEFAULT_MMAP_SIZE=2097152000
            SQLITE_MAX_MMAP_SIZE=6597069766656
          fi

          # Build SQLite
          mkdir sqlite-build && cd sqlite-build
          cl /LD /O2 /Oi /GL /Gy /Gw /Ob2 /GF /fp:fast /utf-8 \
            /wd4003 /wd4047 \
            "/DSQLITE_API=__declspec(dllexport)" \
            /Dalloca=_alloca \
            /DSQLITE_OMIT_DEPRECATED \
            /DSQLITE_OMIT_PROGRESS_CALLBACK \
            /DSQLITE_OMIT_SHARED_CACHE \
            /DSQLITE_OMIT_LOAD_EXTENSION \
            /DSQLITE_OMIT_COMPLETE \
            /DSQLITE_OMIT_DATETIME_FUNCS \
            /DSQLITE_DISABLE_FTS3_UNICODE \
            /DSQLITE_DISABLE_PAGECACHE_OVERFLOW_STATS \
            /DSQLITE_ENABLE_COLUMN_METADATA \
            /DSQLITE_ENABLE_STAT4 \
            /DSQLITE_ENABLE_DBSTAT_VTAB \
            /DSQLITE_ENABLE_NULL_TRIM \
            /DSQLITE_MAX_EXPR_DEPTH=0 \
            /DSQLITE_MAX_MMAP_SIZE=${SQLITE_MAX_MMAP_SIZE} \
            /DSQLITE_DEFAULT_FOREIGN_KEYS=1 \
            /DSQLITE_DEFAULT_MEMSTATUS=0 \
            /DSQLITE_DEFAULT_WAL_SYNCHRONOUS=1 \
            /DSQLITE_DEFAULT_SYNCHRONOUS=2 \
            /DSQLITE_DEFAULT_MMAP_SIZE=${SQLITE_DEFAULT_MMAP_SIZE} \
            /DSQLITE_DEFAULT_LOOKASIDE=1300,200 \
            /DSQLITE_DQS=0 \
            /DSQLITE_LIKE_DOESNT_MATCH_BLOB \
            /DHAVE_ISNAN \
            /DHAVE_LOCALTIME_S \
            /DSQLITE_POWERSAFE_OVERWRITE=1 \
            /DSQLITE_USE_ALLOCA \
            /DSQLITE_TEMP_STORE=2 \
            /DSQLITE_WIN32_MALLOC \
            /DSQLITE_WIN32_HEAP_CREATE \
            /DSQLITE_THREADSAFE=2 \
            ../sqlite-src/sqlite3.c \
            /link /LTCG /OPT:REF /OPT:ICF /OUT:e_sqlite3.dll
          cd ..
          
          # Build everything
          dotnet publish JL.Windows/JL.Windows.csproj --runtime "${{ matrix.target }}" -c Release -o "$release_name" -p:Platform=${{ matrix.platform }}
          
          # Replace bundled SQLite with custom build
          cp sqlite-build/e_sqlite3.dll "${release_name}/e_sqlite3.dll"

          # Mark JL as LARGEADDRESSAWARE
          if [ "${{ matrix.target }}" = "win-x86" ]
          then
          vswhere_path="C:/Program Files (x86)/Microsoft Visual Studio/Installer/vswhere.exe"
          vc_tools_path=$("$vswhere_path" -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find "VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt")
          read -r vc_tools_version < "$vc_tools_path"
          vc_tools_version="${vc_tools_version//$'\r'/}"
          editbin_path=$("$vswhere_path" -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find "VC/Tools/MSVC/${vc_tools_version}/bin/Hostx64/x64/editbin.exe")
          "${editbin_path}" //NOLOGO //LARGEADDRESSAWARE ${release_name}/JL.exe
          fi
          
          #Sign with self-signed certificate
          pfxCertFilePath=${release_name}/JLCertificate.pfx
          echo "${BASE64_PFX}" | base64 --decode > "${pfxCertFilePath}"
          pwsh -c '$password = ConvertTo-SecureString -String '"${PFX_PASSWORD}"' -Force -AsPlainText;''$pfx = Get-PfxCertificate -FilePath '"$pfxCertFilePath"' -Password $password -NoPromptForPassword;''Set-AuthenticodeSignature -FilePath '"$release_name"'/JL.exe -Certificate $pfx -HashAlgorithm SHA256;'
          rm "${pfxCertFilePath}"
          
          # Pack files
          7z a -tzip -mx=9 "${release_name}.zip" "./${release_name}/*"
          
          # Delete output directory
          rm -rf sqlite-build
          rm -rf "$release_name"

      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          files: "JL*.zip"
